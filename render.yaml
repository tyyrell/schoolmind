services:
  - type: web
    name: schoolmind-ai
    runtime: python3
    buildCommand: pip install -r requirements.txt && python setup_demo.py
    startCommand: gunicorn app:app --workers 2 --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: RENDER
        value: "1"
      - key: FLASK_DEBUG
        value: "0"
      - key: GEMINI_API_KEY
        sync: false
