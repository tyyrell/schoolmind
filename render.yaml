services:
  - type: web
    name: schoolmind-ai
    env: python
    region: oregon
    plan: free
    buildCommand: "pip install -r requirements.txt && python setup_demo.py"
    startCommand: "gunicorn app:app --workers 2 --bind 0.0.0.0:$PORT --timeout 120"
    healthCheckPath: /ping
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: RENDER
        value: "1"
      - key: FLASK_DEBUG
        value: "0"
      - key: DB_PATH
        value: "/data/schoolmind.db"
    disk:
      name: schoolmind-db
      mountPath: /data
      sizeGB: 1
